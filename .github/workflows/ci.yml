name: CI

on:
    push:
        branches: [main, staging]
    pull_request:
        branches: [main, staging]

jobs:
    ci:
        name: Lint, Type Check & Build
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Run linter
              run: npm run lint

            - name: Run type check
              run: npx tsc --noEmit

            - name: Build
              run: npm run build
